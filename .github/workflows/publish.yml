name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

# Publishing happens via a GitHub Release so the npm tarball ships with
# provenance + the exact CI-built artifact (don't `npm publish` from a laptop).
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm install --no-audit --no-fund
      # `prepublishOnly` runs lint + tests as the publish gate.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
